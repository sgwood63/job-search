name: resume-generation
kind: skill
description: Generate a tailored, factual resume from profile content for a screened JD, with verification gate and evaluation report
status: active
pinned: v1
latest: v1
policies:
  - factuality
  - evidence-grounding
  - company-descriptors
  - storage-routing
inputs:
  - application_folder   # e.g. applications/2026-06-12-acme-se/
  - profile              # matched profile name
outputs:
