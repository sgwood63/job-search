apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ob1-ingress
  namespace: openbrain
  annotations:
    # Strip the path prefix before forwarding to the backend service.
    # /ob1/sse  → /sse   (OB1 MCP)
    # /job-search/sse → /sse  (job-search MCP)
    # /minio/   → /      (MinIO console)
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /ob1(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: openbrain
            port:
              number: 8000
      - path: /job-search(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: job-search-mcp
            port:
              number: 8001
      - path: /minio(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: minio
            port:
              number: 9001
