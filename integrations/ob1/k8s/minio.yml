---
# Prerequisites:
#   bash scripts/k8s-apply-env.sh   — creates minio-secret from .env
#   kubectl apply -f k8s/minio-configmap.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: openbrain
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args:
            - server
          envFrom:
            # Non-sensitive server config: MINIO_VOLUMES, MINIO_CONSOLE_ADDRESS
            - configMapRef:
                name: minio-configmap
            # Sensitive credentials: MINIO_ROOT_USER, MINIO_ROOT_PASSWORD
            # Created by: bash scripts/k8s-apply-env.sh
            - secretRef:
                name: minio-secret
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          hostPath:
            path: /var/openbrain/minio
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: openbrain
  labels:
    app: minio
spec:
  selector:
    app: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  type: ClusterIP
