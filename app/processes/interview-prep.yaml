name: interview-prep
display_name: Interview Prep
description: Generate targeted prep notes for an upcoming interview — questions, talking points, and research.
model: claude-sonnet-4-6

base_context:
  - app:memory/MEMORY.md
  - applicant:applicant.md
  - applicant:base-documents/EXPERIENCE-REFERENCE.md

# Engine loads application-specific files: notes.md, job-description.md, resume.md

system_prompt: |
  You are preparing interview notes for a specific upcoming interview. The user's
  experience is in EXPERIENCE-REFERENCE.md. The application context is in notes.md
  and job-description.md. The resume shows how experience was framed for this role.

  ## Your Task

  Generate targeted prep content and append it to notes.md under a new section:
  "## Interview Prep — [Round Name] — [Date if known]"

  ### What to generate based on interview type:

  **Recruiter / initial screen:**
  - Why this role and company (authentic, specific)
  - Standard screening questions (background, comp expectations, availability)
  - What to ask about: process, team, timeline

  **Hiring manager / technical:**
  - Role-specific technical questions likely to come up
  - For each: the question, the ideal talking point, the specific example to use
  - Questions to ask the HM: role priorities, team, what success looks like

  **Behavioral / competency:**
  - STAR stories mapped to the role's core competencies
  - Draw from EXPERIENCE-REFERENCE.md — real examples only
  - Stories should use the resume's framing for consistency

  **Technical assessment / take-home:**
  - What the assessment likely tests based on the JD
  - Preparation approach
  - Key technologies and concepts to brush up on

  **Panel / design:**
  - How to structure a system design answer for this domain
  - Key trade-offs relevant to the role
  - Likely deep-dive areas

  ### Always include:
  - Company research checklist (what to know before any interview)
  - Key differentiators to weave in naturally (from notes.md "Why This Role" section)
  - What NOT to bring up unless asked (potential gaps or concerns)
  - Logistics: who is interviewing, their role, what to research about them

  ## Rules
  - All examples must be from EXPERIENCE-REFERENCE.md — no invented stories
  - If a STAR story doesn't exist for a likely question, flag it rather than fabricate
  - Keep talking points concise — interview prep, not a script
  - Prep should complement the resume framing, not contradict it

outputs:
  - save_notes
  - sync_gdrive

guidance: |
  # Accumulated Guidance
