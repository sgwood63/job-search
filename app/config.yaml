# Job Search Assistant — Configuration

# App-relative paths (resolved from app/ directory)
paths:
  templates: "../templates/"
  app_memory: "../memory/"
  resume_css: "../templates/resume.css"

# Applicant data paths (all resolved relative to APPLICANT_DIR env var)
applicant:
  dir_env_var: "APPLICANT_DIR"
  applications: "applications/"
  profiles: "profiles/"
  memory: "memory/"
  base_documents: "base-documents/"
  tracker: "application-tracker.md"
  experience_reference: "base-documents/EXPERIENCE-REFERENCE.md"
  profiles_quick_reference: "profiles/PROFILES-QUICK-REFERENCE.md"
  applicant_profile: "applicant.md"
  gdrive_root: "/Users/shermanwood/Library/CloudStorage/GoogleDrive-sgwood63@gmail.com/My Drive/Job Search 2026/"

# Models
models:
  default: "claude-sonnet-4-6"
  fast: "claude-haiku-4-5-20251001"
  # screen-jd and debrief use fast; generate/review/prep/memory use default

# API
api:
  key_env: "ANTHROPIC_API_KEY"
  max_tokens: 8192
  temperature_factual: 0.0      # screening, debrief, tracker updates
  temperature_generative: 0.3   # resumes, prep notes, review

# PDF generation
pdf:
  engine: "weasyprint"
  pandoc_cmd: "pandoc {input} -o {output} --pdf-engine=weasyprint --css={css}"
  target_pages: 2

# Application folder naming
application:
  folder_format: "{date}-{company_slug}-{role_slug}"
  date_format: "%Y-%m-%d"

# Sync
sync:
  auto_sync_gdrive: true        # sync to Google Drive after every file write

# App URL (used to construct "open in new tab" links)
app_url: "http://localhost:8501"
