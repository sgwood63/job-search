name: job-search-webapp

# Webapp service only. Combine with integrations/ob1/docker-compose.yml for OB1 mode:
#
#   # Local mode (reads files from APPLICANT_DIR)
#   docker compose -f webapp/docker-compose.yml up
#
#   # OB1 mode (webapp + OB1 infrastructure — PostgreSQL, MinIO, MCP servers)
#   docker compose \
#     -f webapp/docker-compose.yml \
#     -f integrations/ob1/docker-compose.yml up
#
# OB1 mode requires these overrides in .env:
#   DATA_BACKEND=ob1
#   JOB_SEARCH_REST_URL=http://job-search-mcp:8001   # docker-compose service name
#
# In OB1 mode the webapp routes all data access through the job-search-mcp REST API
# (/api/v2/*) — no direct PostgreSQL or MinIO credentials are needed in the webapp.
#
# ANTHROPIC_API_DEPLOYMENT_KEY must be set in .env for chat sessions (no OAuth in containers).

services:
  webapp:
    build:
      context: ..
      dockerfile: webapp/Dockerfile
    image: job-search-webapp:latest
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      # Override path-dependent vars that differ between host and container
      APP_DIR: /app
      APPLICANT_DIR: /applicant   # ignored when DATA_BACKEND=ob1
      DEV_MODE: "false"           # APP_DIR is always read-only in container
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_DEPLOYMENT_KEY:-}  # use deployment key, not personal OAuth key
      # OB1 mode: webapp REST client — must match job-search-mcp service name in combined compose
      JOB_SEARCH_REST_URL: ${JOB_SEARCH_REST_URL:-http://job-search-mcp:8001}
    volumes:
      # Local mode: mount APPLICANT_DIR read-only
      # OB1 mode: this mount is ignored (webapp reads from PostgreSQL/MinIO)
      - ${APPLICANT_DIR:-/tmp/no-applicant-dir}:/applicant:ro
    restart: unless-stopped
