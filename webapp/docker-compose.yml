name: job-search-webapp

# Webapp service only. Combine with integrations/ob1/docker-compose.yml for OB1 mode:
#
#   # Local mode (reads files from APPLICANT_DIR)
#   docker compose -f webapp/docker-compose.yml up
#
#   # OB1 mode (webapp + PostgreSQL + MinIO)
#   docker compose \
#     -f webapp/docker-compose.yml \
#     -f integrations/ob1/docker-compose.yml up
#
# OB1 mode requires these overrides in .env (different from K8s cluster-internal DNS):
#   DATA_BACKEND=ob1
#   DB_HOST=postgres
#   MINIO_ENDPOINT=minio:9000
#
# ANTHROPIC_API_KEY must be set in .env for chat sessions (no OAuth in containers).

services:
  webapp:
    build:
      context: ..
      dockerfile: webapp/Dockerfile
    image: job-search-webapp:latest
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      # Override path-dependent vars that differ between host and container
      APP_DIR: /app
      APPLICANT_DIR: /applicant   # ignored when DATA_BACKEND=ob1
    volumes:
      # Local mode: mount APPLICANT_DIR read-only
      # OB1 mode: this mount is ignored (webapp reads from PostgreSQL/MinIO)
      - ${APPLICANT_DIR:-/tmp/no-applicant-dir}:/applicant:ro
    restart: unless-stopped
